<section class="form-section">
    <div class="form-section__container container">
        <div class="form-section__top">
            <h3 class="form-section__heading title title--100 js-anime-title">
                Начнём строить <br> <span>вашу геометрию?</span>
            </h3>
            <p class="form-section__subtitle text text--light">
                Заполните заявку и мы ответим вам в ближайшее время!
            </p>
        </div>
        <div class="form-section__wrapper">
            <form action="./upload/" class="form-section__form form form--modal js-form-1"
				  enctype="multipart/form-data"
				  method="post">
				<label class="form__field">
					<input class="form__input js-input" type="text" name="name" placeholder="Имя">
                    <span class="wpcf7-not-valid-tip" aria-hidden="true">Важно заполнить это поле.</span>
				</label>
				<label class="form__field">
                    <input class="form__input js-input" type="text" name="email" placeholder="Компания">
                    <span class="wpcf7-not-valid-tip" aria-hidden="true">Важно заполнить это поле.</span>
				</label>
                <label class="form__field">
                    <input class="form__input js-input" type="tel" name="phone" placeholder="+7 (999) 999-99-99">
                </label>
				<label class="form__field form__field--textarea">
					<textarea name="message" class="form__input form__input--textarea" placeholder="Задача"></textarea>
				</label>
				<div class="form__actions">
					<div class="form__accept">
						<input class="form__checkbox" type="checkbox" id="form-agreement"
							   name="agreement"
							   checked>
						<label for="form-agreement"
							   class="form__accept-label">
								<span class="form-section__accept-text form__accept-text">
									Даю своё <a href="">согласие на обработку персональных данных</a>
								</span>
						</label>
					</div>
                    <div class="form__accept">
						<input class="form__checkbox" type="checkbox" id="form-policy"
							   name="policy"
							   checked>
						<label for="form-policy"
							   class="form__accept-label">
								<span class="form-section__accept-text form__accept-text">
									Ознакомлен с <a href="">Политикой конфиденциальности</a> и <a href=""></a>Пользовательским соглашением</a>
								</span>
						</label>
					</div>
					<button type="button" class="form__btn btn btn--second"
							data-hystmodal="#thanks">
						<span>Отправить на расчёт</span>
					</button>
				</div>
			</form>
        </div>
    </div>
</section>

<!-- Модалка успешной отправки -->
<div class="modal modal--thanks hystmodal js-modal-success" id="thanks" aria-hidden="true">
    <div class="modal__wrap hystmodal__wrap">
        <div class="modal__body hystmodal__window" role="dialog" aria-modal="true">
            <button data-hystclose class="modal__close hystmodal__close">Close</button>
            <div class="modal__header">
				<div class="modal__title">
					<div class="modal__word-wrap">
                        <div class="modal__word title title--100">
                            Спасибо
                        </div> 
                        <div class="modal__subtext text">
                            Вы только что сделали шаг к росту бизнеса!
                        </div>
                    </div>
                    <div class="modal__word modal__word--second title title--100">
                        <span>Заявка отправлена</span>
                    </div>
				</div>
				<div class="modal__subtitle modal__subtitle--first title title--32">
					Мы внимательно изучим вашу заявку и ответим в ближайшее время
				</div>
				<div class="modal__subtitle modal__subtitle--second title title--32">
					А пока вы ждете ответа, посмотрите наши кейсы
				</div>
			</div>
			<a href="" class="modal__thanks-btn btn btn--second">
				<span>Смотреть наши кейсы</span>
			</a>
		</div>
	</div>
</div>
